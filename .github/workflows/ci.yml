name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src/"

      - name: Format (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check src/"
